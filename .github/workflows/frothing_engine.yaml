name: FROTHING_ENGINE_LIVE

on:
  schedule:
    - cron: '0,30 * * * *' # Auto-run at :00 and :30 of every hour
  workflow_dispatch:      # Keep your manual button trigger

jobs:
  run_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Frothing Engine
        run: python froth_reporter.py

      - name: Commit and Push Update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "STATION_42098_UPDATE [skip ci]"
          file_pattern: 'index.html'
          branch: main
