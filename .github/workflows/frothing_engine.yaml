name: Frothing_Final_v1
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for reliable pushes

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - run: pip install -r requirements.txt

      - run: python froth_reporter.py

      - name: Save_Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@frothing.io"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Force sync to prevent Error 128
          git pull origin main --rebase
          
          git add index.html
          git commit -m "STATION_42098_UPDATE [skip ci]" || exit 0
          git push origin main
