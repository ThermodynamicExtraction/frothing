name: FROTHING_ENGINE_LIVE

on:
  schedule:
    # Runs at 0 and 30 minutes past every hour (UTC)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Allows you to trigger it manually via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permission fix to ensure the bot can push the new index.html
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Froth Reporter
        run: python froth_reporter.py
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "FROTH_UPDATE: {timestamp}"
          file_pattern: 'index.html'
