name: FROTHING_TEST_FINAL

on:
  workflow_dispatch: # Manual button trigger only

jobs:
  run_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Frothing Engine
        run: python froth_reporter.py

      - name: Save_Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@frothing.io"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # 1. Stage the new index.html generated by the script
          git add index.html
          
          # 2. Commit it locally so the workspace is "clean"
          git commit -m "STATION_42098_UPDATE [skip ci]" || exit 0
          
          # 3. Pull any remote changes and rebase our commit on top
          git pull origin main --rebase
          
          # 4. Push the final synchronized state to GitHub
          git push origin main
