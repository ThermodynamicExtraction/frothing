name: Frothing Automated Reporter

on:
  schedule:
    # This runs the script every 6 hours (at minute 0)
    - cron: '0 */6 * * *' 
  workflow_dispatch: # This allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Gives the robot permission to update index.html
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: trueut@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Frothing Script
        run: python froth_reporter.py

      - name: Update Minitel Dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          git config --global user.name "FROTHING_SYSTEM_v1"
          git config --global user.email "bot@frothing.io"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Force sync with the latest repo state
          git fetch origin main
          git reset --soft origin/main
          
          if [ -f index.html ]; then
            git add index.html
            # We add [skip ci] to prevent the bot from triggering itself in a loop
            git commit -m "STATION_42098: Data Inventory Updated [skip ci]" || echo "No changes to commit"
            git push origin main --force
          else
            echo "ERROR: index.html not found."
            exit 1
          fi
