name: Frothing Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Runs every hour

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Frothing Engine
        run: python froth_reporter.py

      - name: Update Minitel Dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "FROTHING_SYSTEM_v1"
          git config --global user.email "bot@frothing.io"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Force clean state
          git add index.html
          git commit -m "STATION_42098: Data Inventory Updated [skip ci]" || echo "No changes"
          
          # Pull latest and push
          git pull origin main --rebase
          git push origin main
